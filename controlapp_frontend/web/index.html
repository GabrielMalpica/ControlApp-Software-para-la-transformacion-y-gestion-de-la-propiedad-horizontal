<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- Fallback para html renderer si falla la fuente cacheada de iconos -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="ControlApp">
  <link rel="apple-touch-icon" href="https://controlsas.com.co/wp-content/uploads/2025/08/cropped-foto-de-perfil-png@4x.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="https://controlsas.com.co/wp-content/uploads/2025/08/cropped-foto-de-perfil-png@4x.png"/>

  <title>ControlApp</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script>
    // Clean up stale Flutter service workers from older web deployments.
    window.addEventListener('load', function () {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations()
            .then(function (registrations) {
              return Promise.all(
                  registrations.map(function (registration) {
                    return registration.unregister();
                  }));
            })
            .catch(function () {});
      }

      if ('caches' in window) {
        caches.keys()
            .then(function (keys) {
              return Promise.all(
                  keys
                      .filter(function (key) {
                        return key.indexOf('flutter-') === 0;
                      })
                      .map(function (key) {
                        return caches.delete(key);
                      }));
            })
            .catch(function () {});
      }
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
